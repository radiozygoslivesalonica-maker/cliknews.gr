<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClikNews.gr — Όλες οι Ειδήσεις</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090F;font-family:'Inter',system-ui,sans-serif;color:#F1F5F9;min-height:100vh}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#08090F}::-webkit-scrollbar-thumb{background:#3D4560;border-radius:4px}
header{background:linear-gradient(180deg,#0C0E1A,#08090F);border-bottom:1px solid #1C1F2E;padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:40px;object-fit:contain}
.tagline{font-size:10px;color:#3D4560;letter-spacing:.03em}
.search-box{background:#ffffff07;border:1px solid #1C1F2E;border-radius:10px;padding:7px 13px;font-size:13px;color:#F1F5F9;width:150px;outline:none}
.catbar{background:#0B0C14;border-bottom:1px solid #1C1F2E;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cat-select{background:#08090F;border:1px solid #3B82F644;border-radius:10px;padding:8px 32px 8px 14px;font-size:13px;font-weight:700;color:#3B82F6;cursor:pointer;outline:none;appearance:none;position:relative;min-width:160px}
.cat-wrap{position:relative}
.cat-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:11px;color:#3B82F6}
.banner{flex:1;min-width:80px;height:38px;border-radius:10px;position:relative;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.1);text-decoration:none;display:flex;align-items:center;justify-content:center}
.banner-bg{position:absolute;inset:0}
.banner-glass{position:absolute;inset:0;background:rgba(255,255,255,.07);backdrop-filter:blur(6px)}
.banner-shine{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent);border-radius:10px 10px 0 0}
.banner-text{position:relative;z-index:1;text-align:center}
.banner-text span{display:block;font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.banner-text small{font-size:9px;color:rgba(255,255,255,.65)}
main{padding:18px 20px;max-width:860px;margin:0 auto}
.featured{border-radius:20px;padding:28px;position:relative;overflow:hidden;margin-bottom:14px}
.featured h2{font-size:22px;font-weight:900;color:#fff;line-height:1.25;margin:0 0 10px;cursor:pointer;letter-spacing:-.02em}
.featured p{font-size:13px;color:rgba(241,245,249,.6);line-height:1.6;margin:0 0 18px;max-width:500px}
.featured-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:900;padding:3px 10px;border-radius:4px;letter-spacing:.1em;border:1px solid}
.cat-tag{font-size:11px;font-weight:700}
.featured-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{font-size:13px;font-weight:800;color:#fff;border:none;border-radius:10px;padding:10px 20px;cursor:pointer}
.btn-share{font-size:13px;font-weight:700;border-radius:10px;padding:10px 14px;cursor:pointer;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff}
.card{background:#0F1117;border:1px solid #1C1F2E;border-radius:12px;padding:13px 16px;display:grid;grid-template-columns:1fr auto;gap:8px 12px;align-items:start;margin-bottom:8px;transition:all .18s;border-left:3px solid}
.card:hover{background:#161820}
.card h3{font-size:14px;font-weight:800;color:#F1F5F9;line-height:1.35;margin:0 0 4px;cursor:pointer}
.card p{font-size:12px;color:#94A3B8;line-height:1.5;margin:0}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.card-cat{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
.card-source{font-size:11px;color:#3D4560}
.card-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.btn-post{font-size:11px;font-weight:800;border-radius:7px;padding:5px 10px;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.hotbar{display:flex;align-items:center;gap:4px}
.hotbar-track{width:44px;height:3px;background:#1C1F2E;border-radius:2px;overflow:hidden}
.hotbar-fill{height:100%;border-radius:2px}
.hotbar span{font-size:10px;font-weight:700}
footer{border-top:1px solid #1C1F2E;padding:16px;text-align:center;font-size:11px;color:#3D4560}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#0F1117;border-radius:20px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;color:#F1F5F9;margin:6px 0 16px;line-height:1.3}
.platform-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.platform-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.gen-btn{width:100%;padding:12px;border-radius:10px;border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.caption-area{width:100%;background:#08090F;border:1px solid #1C1F2E;border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.6;font-family:inherit;resize:vertical;color:#F1F5F9}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-cancel{padding:9px 16px;border-radius:8px;border:1px solid #1C1F2E;background:none;cursor:pointer;font-size:13px;color:#94A3B8}
.btn-copy{padding:9px 20px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:800;transition:background .2s}
/* Admin */
.admin-inp{width:100%;background:#08090F;border:1px solid #1C1F2E;border-radius:10px;padding:9px 12px;font-size:13px;color:#F1F5F9;font-family:inherit;outline:none;margin-bottom:9px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://raw.githubusercontent.com/radiozygoslivesalonica-maker/cliknews.gr/main/Logo%20cliknews.jpg" alt="ClikNews.gr" onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'"/>
    <span id="logo-text" style="display:none;font-size:20px;font-weight:900;background:linear-gradient(135deg,#fff,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ClikNews.gr</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <input class="search-box" placeholder="🔍 Αναζήτηση…" id="searchInput" oninput="renderNews()"/>
    <span style="font-size:10px;color:#3D4560" id="timeDisplay"></span>
  </div>
</header>

<div class="catbar">
  <div class="cat-wrap">
    <select class="cat-select" id="catSelect" onchange="renderNews()">
      <option value="all">⚡ Όλα</option>
      <option value="breaking">🔥 Breaking</option>
      <option value="trending">📈 Trending</option>
      <option value="viral">😂 Viral</option>
      <option value="lifestyle">🎯 Lifestyle</option>
      <option value="sports">⚽ Αθλητικά</option>
      <option value="world">🌍 Κόσμος</option>
      <option value="nightlife">🌙 Nightlife Greece</option>
      <option value="tourism">✈️ Τουρισμός</option>
      <option value="music">🎵 Μουσική</option>
      <option value="health">💪 Gym & Health</option>
      <option value="auto">🚗 Αυτοκίνητο</option>
      <option value="beauty">💅 Ομορφιά & Tips</option>
    </select>
    <span class="cat-arrow">▼</span>
  </div>
  <a class="banner" href="#" style="background:linear-gradient(135deg,#2563EBcc,#06B6D4cc)">
    <div class="banner-glass"></div><div class="banner-shine"></div>
    <div class="banner-text"><span>Διαφήμιση</span><small>Your Ad Here</small></div>
  </a>
  <a class="banner" href="#" style="background:linear-gradient(135deg,#7C3AEDcc,#EC4899cc)">
    <div class="banner-glass"></div><div class="banner-shine"></div>
    <div class="banner-text"><span>Διαφήμιση</span><small>Your Ad Here</small></div>
  </a>
  <a class="banner" href="#" style="background:linear-gradient(135deg,#10B981cc,#84CC16cc)">
    <div class="banner-glass"></div><div class="banner-shine"></div>
    <div class="banner-text"><span>Διαφήμιση</span><small>Your Ad Here</small></div>
  </a>
</div>

<main id="mainContent"></main>
<footer>© 2026 ClikNews.gr · Όλες οι σημαντικές Ειδήσεις σε Ελλάδα και Κόσμο</footer>

<!-- Post Modal -->
<div class="modal-bg" id="postModal" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalCatTag"></div>
    <h3 id="modalTitle"></h3>
    <div class="platform-btns" id="platformBtns"></div>
    <button class="gen-btn" id="genBtn" onclick="generatePost()">✦ Δημιουργία με AI</button>
    <textarea class="caption-area" id="captionArea" rows="7"></textarea>
    <p style="font-size:11px;color:#3D4560;margin:5px 0 0">💡 Επεξεργάσου πριν αντιγράψεις.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Κλείσιμο</button>
      <button class="btn-copy" id="copyBtn" onclick="copyCaption()">Αντιγραφή</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="modal-bg" id="adminModal" style="display:none" onclick="closeAdmin()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="adminContent"></div>
  </div>
</div>

<script>
const CATS = {
  all:{label:"Όλα",icon:"⚡",color:"#ffffff"},
  breaking:{label:"Breaking",icon:"🔥",color:"#EF4444"},
  trending:{label:"Trending",icon:"📈",color:"#10B981"},
  viral:{label:"Viral",icon:"😂",color:"#F59E0B"},
  lifestyle:{label:"Lifestyle",icon:"🎯",color:"#EC4899"},
  sports:{label:"Αθλητικά",icon:"⚽",color:"#F97316"},
  world:{label:"Κόσμος",icon:"🌍",color:"#06B6D4"},
  nightlife:{label:"Nightlife Greece",icon:"🌙",color:"#A78BFA"},
  tourism:{label:"Τουρισμός",icon:"✈️",color:"#34D399"},
  music:{label:"Μουσική",icon:"🎵",color:"#F472B6"},
  health:{label:"Gym & Health",icon:"💪",color:"#4ADE80"},
  auto:{label:"Αυτοκίνητο",icon:"🚗",color:"#60A5FA"},
  beauty:{label:"Ομορφιά & Tips",icon:"💅",color:"#F9A8D4"},
};

const PLATFORMS = [
  {id:"instagram",label:"Instagram",icon:"📸",tone:"visual, engaging, με emojis, max 150 λέξεις, τελειώνει με 5 hashtags"},
  {id:"facebook",label:"Facebook",icon:"👥",tone:"πληροφοριακό, φιλικό, max 80 λέξεις, 3 hashtags"},
  {id:"tiktok",label:"TikTok",icon:"🎵",tone:"πολύ σύντομο, viral, hook στην πρώτη γραμμή, max 50 λέξεις"},
  {id:"twitter",label:"X/Twitter",icon:"𝕏",tone:"άμεσο, έντονο, max 280 χαρακτήρες, 2 hashtags"},
  {id:"threads",label:"Threads",icon:"🧵",tone:"conversational, max 100 λέξεις"},
];

let NEWS = [
  {id:1,title:"Σεισμός 5.8 Ρίχτερ στην Αττική — Αισθητός σε όλη την Ελλάδα",summary:"Ισχυρός σεισμός έπληξε την Αττική νωρίς το πρωί. Δεν αναφέρθηκαν θύματα ή ζημιές σε κτίρια.",time:"5 λεπτά",category:"breaking",hot:98,source:"protothema.gr",url:"https://www.protothema.gr"},
  {id:2,title:"Καύσωνας: 44°C αύριο — Έκτακτο δελτίο ΕΜΥ για όλη την Ελλάδα",summary:"Η ΕΜΥ εξέδωσε έκτακτο δελτίο επικίνδυνων καιρικών φαινομένων. Αποφύγετε έκθεση 11:00–17:00.",time:"12 λεπτά",category:"breaking",hot:95,source:"kathimerini.gr",url:"https://www.kathimerini.gr"},
  {id:3,title:"Έλληνας creator έσπασε ρεκόρ: 80 εκατ. views σε 48 ώρες στο TikTok",summary:"Βίντεο Έλληνα δημιουργού έγινε viral παγκοσμίως και τράβηξε διεθνή προσοχή.",time:"25 λεπτά",category:"viral",hot:99,source:"in.gr",url:"https://www.in.gr"},
  {id:4,title:"Ολυμπιακός: Επίσημη ανακοίνωση για νέο προπονητή — Ισπανός τεχνικός",summary:"Η ΠΑΕ Ολυμπιακός ανακοίνωσε την απόκτηση έμπειρου Ισπανού τεχνικού με στόχο την Ευρώπη.",time:"40 λεπτά",category:"sports",hot:87,source:"gazzetta.gr",url:"https://www.gazzetta.gr"},
  {id:5,title:"Taylor Swift: Νέο album — Ρεκόρ pre-orders σε 24 ώρες",summary:"18 νέα tracks, κυκλοφορία Σεπτέμβριο. Έσπασε κάθε ρεκόρ στις προ-παραγγελίες παγκοσμίως.",time:"1 ώρα",category:"trending",hot:93,source:"pes.gr",url:"https://www.pes.gr"},
  {id:6,title:"Μύκονος: Νέοι κανόνες για τουρίστες — Τι αλλάζει φέτος το καλοκαίρι",summary:"Περιορισμοί επισκεπτών, νέες τιμές και κανόνες — τι να ξέρεις πριν ταξιδέψεις.",time:"1 ώρα",category:"tourism",hot:82,source:"newsbeast.gr",url:"https://www.newsbeast.gr"},
  {id:7,title:"Αθήνα Nightlife 2026: Τα 10 καλύτερα clubs του καλοκαιριού",summary:"Ο πλήρης οδηγός για τα hot spots της αθηναϊκής νύχτας — Γκάζι, Ριβιέρα και νέες αφίξεις.",time:"2 ώρες",category:"nightlife",hot:85,source:"newsbeast.gr",url:"https://www.newsbeast.gr"},
  {id:8,title:"Spotify αλλάζει πληρωμές καλλιτεχνών — Τι σημαίνει για την ελληνική δισκογραφία",summary:"Νέο μοντέλο αποζημίωσης που επηρεάζει εκατομμύρια ανεξάρτητους καλλιτέχνες.",time:"3 ώρες",category:"music",hot:75,source:"rocking.gr",url:"https://www.rocking.gr"},
  {id:9,title:"G7: Νέες κυρώσεις κατά Ρωσίας — Αντιδράσεις Μόσχας",summary:"Νέο πακέτο κυρώσεων από τους G7 εστιάζοντας στον ενεργειακό τομέα.",time:"3 ώρες",category:"world",hot:71,source:"kathimerini.gr",url:"https://www.kathimerini.gr"},
  {id:10,title:"Το viral πρωινό που όλοι τρώνε φέτος — Η νέα τάση του ελληνικού καλοκαιριού",summary:"Τάση που σαρώνει το TikTok και έχει γίνει η νέα συνήθεια του ελληνικού καλοκαιριού.",time:"4 ώρες",category:"lifestyle",hot:88,source:"in2life.gr",url:"https://www.in2life.gr"},
  {id:11,title:"BMW M5 vs Mercedes AMG E63: Η μεγάλη δοκιμή του 2026",summary:"Συγκριτική δοκιμή των δύο κορυφαίων sport sedan — ποιο κερδίζει στην πίστα;",time:"5 ώρες",category:"auto",hot:77,source:"newsauto.gr",url:"https://www.newsauto.gr"},
  {id:12,title:"10 beauty hacks που κάνουν viral τις Ελληνίδες στο TikTok",summary:"Από SPF routines ως μεσογειακά συστατικά — τα μυστικά ομορφιάς που όλες μοιράζονται.",time:"6 ώρες",category:"beauty",hot:83,source:"queen.gr",url:"https://www.queen.gr"},
  {id:13,title:"5 τροφές που καίνε λίπος πιο αποτελεσματικά από τη γυμναστική",summary:"Νέα έρευνα αποκαλύπτει ποιες τροφές επιταχύνουν τον μεταβολισμό.",time:"7 ώρες",category:"health",hot:86,source:"vita.gr",url:"https://www.vita.gr"},
  {id:14,title:"Grammy 2027: Beyoncé vs Kendrick — 9 υποψηφιότητες ο καθένας",summary:"Η Recording Academy ανακοίνωσε τις υποψηφιότητες. Επική σύγκρουση για το βραβείο χρονιάς.",time:"8 ώρες",category:"trending",hot:90,source:"pes.gr",url:"https://www.pes.gr"},
  {id:15,title:"Ρεκόρ τουριστών στην Ελλάδα — 35 εκατ. αφίξεις το 2026",summary:"Η Ελλάδα έχει ήδη σπάσει το ρεκόρ αφίξεων του 2025 με μήνες μπροστά.",time:"9 ώρες",category:"tourism",hot:78,source:"newsbeast.gr",url:"https://www.newsbeast.gr"},
];

// Load own articles from localStorage if available
try {
  const saved = localStorage.getItem('cliknews_own');
  if(saved) NEWS = [...JSON.parse(saved), ...NEWS];
} catch(e){}

let currentItem = null;
let currentPlatform = "instagram";
let logoClicks = [];
const ADMIN_PASS = "cliknews2026";

function getCat(id){ return CATS[id] || CATS.all; }

function hotMeter(val, color){
  return `<div class="hotbar"><div class="hotbar-track"><div class="hotbar-fill" style="width:${val}%;background:${color};box-shadow:0 0 6px ${color}"></div></div><span style="color:${color}">${val}</span></div>`;
}

function renderNews(){
  const cat = document.getElementById('catSelect').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  let items = NEWS.filter(i => {
    const matchCat = cat === 'all' || i.category === cat;
    const matchSearch = !search || i.title.toLowerCase().includes(search);
    return matchCat && matchSearch;
  }).sort((a,b) => (b.hot||0)-(a.hot||0));

  const main = document.getElementById('mainContent');
  if(!items.length){ main.innerHTML='<div style="text-align:center;color:#3D4560;padding:80px 0;font-size:14px">Δεν βρέθηκαν ειδήσεις.</div>'; return; }

  const featured = items[0];
  const rest = items.slice(1);
  const fc = getCat(featured.category);
  const gradients = {breaking:"linear-gradient(135deg,#1a0000,#7f1d1d 60%,#08090F)",trending:"linear-gradient(135deg,#052e16,#14532d 60%,#08090F)",viral:"linear-gradient(135deg,#1c1203,#78350f 60%,#08090F)",lifestyle:"linear-gradient(135deg,#2d0a1f,#831843 60%,#08090F)",sports:"linear-gradient(135deg,#1a0a00,#7c2d12 60%,#08090F)",world:"linear-gradient(135deg,#042f2e,#134e4a 60%,#08090F)",nightlife:"linear-gradient(135deg,#1e1040,#3b0764 60%,#08090F)",tourism:"linear-gradient(135deg,#042f2e,#065f46 60%,#08090F)",music:"linear-gradient(135deg,#2d0a1f,#9d174d 60%,#08090F)",health:"linear-gradient(135deg,#052e16,#166534 60%,#08090F)",auto:"linear-gradient(135deg,#0a1628,#1e3a5f 60%,#08090F)",beauty:"linear-gradient(135deg,#2d0a1f,#9d174d 60%,#08090F)"};

  let html = `<div class="featured" style="background:${gradients[featured.category]||gradients.breaking};border:1px solid ${fc.color}33;box-shadow:0 0 60px ${fc.color}15">
    <div style="position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:${fc.color};opacity:.07;filter:blur(60px);pointer-events:none"></div>
    <div class="featured-meta">
      <span class="badge" style="color:${fc.color};border-color:${fc.color};background:${fc.color}15">★ TOP STORY</span>
      <span class="cat-tag" style="color:${fc.color}">${fc.icon} ${fc.label}</span>
      ${hotMeter(featured.hot, fc.color)}
      <span style="font-size:11px;color:rgba(241,245,249,.35);margin-left:auto">${featured.source} · ${featured.time}</span>
    </div>
    <h2 onclick="window.open('${featured.url}','_blank')">${featured.title}</h2>
    <p>${featured.summary}</p>
    <div class="featured-btns">
      <button class="btn-primary" style="background:linear-gradient(135deg,${fc.color}dd,${fc.color}88);box-shadow:0 4px 20px ${fc.color}44" onclick="openModal(${featured.id})">✦ Δημιουργία Social Post</button>
      <button class="btn-share" onclick="shareItem('${featured.url}','${featured.title.replace(/'/g,"\\'")}')">↗ Μοιράσου</button>
      <a href="${featured.url}" target="_blank" style="font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;align-self:center">Πηγή →</a>
    </div>
  </div>`;

  rest.forEach(item => {
    const c = getCat(item.category);
    html += `<div class="card" style="border-left-color:${item.own?'#F59E0B':c.color}" onmouseenter="this.style.borderColor='${c.color}44'" onmouseleave="this.style.borderColor='#1C1F2E'">
      <div>
        <div class="card-meta">
          <span class="card-cat" style="color:${c.color};background:${c.color}15">${c.icon} ${c.label}</span>
          ${item.own?'<span style="font-size:10px;font-weight:700;color:#F59E0B;border:1px solid #F59E0B44;padding:2px 7px;border-radius:20px">✍ ClikNews</span>':''}
          <span class="card-source">${item.source} · ${item.time}</span>
        </div>
        <h3 onclick="window.open('${item.url}','_blank')">${item.title}</h3>
        <p>${item.summary}</p>
      </div>
      <div class="card-actions">
        ${hotMeter(item.hot, c.color)}
        <button class="btn-post" style="color:${c.color};border-color:${c.color}44;background:${c.color}15" onclick="openModal(${item.id})">✦ Post</button>
        <button class="btn-post" style="color:#94A3B8;border-color:#1C1F2E;background:none" onclick="shareItem('${item.url}','${item.title.replace(/'/g,"\\'")}')">↗</button>
      </div>
    </div>`;
  });

  main.innerHTML = html;
}

function openModal(id){
  currentItem = NEWS.find(i=>i.id===id);
  if(!currentItem) return;
  const c = getCat(currentItem.category);
  document.getElementById('modalCatTag').innerHTML = `<span style="font-size:12px;font-weight:800;color:${c.color}">${c.icon} ${c.label}</span>`;
  document.getElementById('modalTitle').textContent = currentItem.title;
  document.getElementById('captionArea').value = `${c.icon} ${currentItem.title}\n\n${currentItem.summary}`;
  document.getElementById('copyBtn').style.background = c.color;

  let btnHtml = '';
  PLATFORMS.forEach(p => {
    const active = p.id === currentPlatform;
    btnHtml += `<button class="platform-btn" style="background:${active?c.color:'#ffffff08'};color:${active?'#fff':'#94A3B8'};border:1px solid ${active?c.color:'#1C1F2E'}" onclick="setPlatform('${p.id}')">${p.icon} ${p.label}</button>`;
  });
  document.getElementById('platformBtns').innerHTML = btnHtml;
  document.getElementById('genBtn').style.background = `linear-gradient(135deg,${c.color},#7C3AED)`;
  document.getElementById('postModal').style.display = 'flex';
}

function setPlatform(id){
  currentPlatform = id;
  if(currentItem) openModal(currentItem.id);
}

function closeModal(){ document.getElementById('postModal').style.display='none'; }

async function generatePost(){
  if(!currentItem) return;
  const p = PLATFORMS.find(x=>x.id===currentPlatform);
  const c = getCat(currentItem.category);
  const btn = document.getElementById('genBtn');
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Δημιουργία…';
  btn.disabled = true;
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`Είσαι social media manager με 3 εκατομμύρια followers στην Ελλάδα.\nΓράψε ένα post για ${p.label}.\nΎφος: ${p.tone}.\nΓράψε ΜΟΝΟ το κείμενο, στα Ελληνικά.\nΚατηγορία: ${c.icon} ${c.label}\nΤίτλος: ${currentItem.title}\nΠερίληψη: ${currentItem.summary}`}]})
    });
    const data = await res.json();
    document.getElementById('captionArea').value = data.content?.[0]?.text || "Σφάλμα. Δοκίμασε ξανά.";
  }catch{ document.getElementById('captionArea').value = "Σφάλμα σύνδεσης."; }
  btn.innerHTML = "✦ Δημιουργία με AI";
  btn.disabled = false;
}

function copyCaption(){
  navigator.clipboard.writeText(document.getElementById('captionArea').value);
  const btn = document.getElementById('copyBtn');
  btn.textContent = "✓ Αντιγράφηκε!";
  btn.style.background = "#10B981";
  setTimeout(()=>{ btn.textContent="Αντιγραφή"; btn.style.background=getCat(currentItem?.category||'all').color; },2000);
}

function shareItem(url, title){
  if(navigator.share){ navigator.share({title,url}); }
  else{ navigator.clipboard.writeText(url); alert("Link αντιγράφηκε!"); }
}

function handleLogoClick(){
  const now = Date.now();
  logoClicks = [...logoClicks.filter(t=>now-t<1500), now];
  if(logoClicks.length >= 3){ logoClicks=[]; showAdmin(); }
}

function showAdmin(){
  document.getElementById('adminContent').innerHTML = `
    <h3 style="font-size:17px;font-weight:900;color:#F1F5F9;margin:0 0 6px">🔐 Admin</h3>
    <input type="password" class="admin-inp" id="adminPass" placeholder="Κωδικός…" onkeydown="if(event.key==='Enter')adminLogin()"/>

function adminLogin(){
  if(document.getElementById('adminPass').value === ADMIN_PASS){ showAdminForm(); }

}

function showAdminForm(){
  const cats = Object.entries(CATS).filter(([k])=>k!=='all').map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join('');
  document.getElementById('adminContent').innerHTML = `
    <h3 style="font-size:17px;font-weight:900;color:#F1F5F9;margin:0 0 16px">✍️ Νέο Άρθρο</h3>
    <input class="admin-inp" id="aTitle" placeholder="Τίτλος…"/>

      <button class="btn-cancel" onclick="closeAdmin()">Ακύρωση</button>
      <button class="btn-copy" style="background:linear-gradient(135deg,#F59E0B,#D97706)" onclick="saveArticle()">Δημοσίευση</button>
    </div>`;
}

function saveArticle(){
  const title = document.getElementById('aTitle').value.trim();
  if(!title) return;
  const newItem = {
    id: Date.now(), title,
    summary: document.getElementById('aSummary').value,
    url: document.getElementById('aUrl').value || "#",
    category: document.getElementById('aCat').value,
    time: "Μόλις τώρα", own: true, hot: 75, source: "ClikNews"
  };
  NEWS.unshift(newItem);
  try{
    const own = NEWS.filter(i=>i.own);
    localStorage.setItem('cliknews_own', JSON.stringify(own));
  }catch(e){}
  closeAdmin();
  renderNews();
}

function closeAdmin(){ document.getElementById('adminModal').style.display='none'; }

async function fetchLiveNews(){
  let live=[];let idc=1000;
  for(const f of RSS_FEEDS){
    try{
     //const r=await fetch("https://corsproxy.io/?url="+encodeURIComponent(f.url));
      const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(f.url));
      const t=await r.text();
      const x=new DOMParser().parseFromString(t,"text/xml");
      const items=x.querySelectorAll("item");
      items.forEach((it,i)=>{
        if(i>=5)return;
        const title=it.querySelector("title")?.textContent||"";
        const link=it.querySelector("link")?.textContent||"";
        const desc=(it.querySelector("description")?.textContent||"").replace(/<[^>]*>/g,'').slice(0,150);
        live.push({id:idc++,title:title,summary:desc,time:"μόλις τώρα",category:f.category,hot:80-i*5,source:f.source,url:link});
      });
    }catch(e){console.error("RSS error",f.url,e);}
  }
  if(live.length){NEWS=[...live,...NEWS];renderNews();}
}
fetchLiveNews();
setInterval(fetchLiveNews,5*60*1000);
