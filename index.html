<body>
<div id="root"></div>

const ADMIN_PASSWORD = "cliknews2026";

const CATEGORIES = [
  {id:"all",label:"Όλα",icon:"⚡",color:"#ffffff"},
  {id:"breaking",label:"Breaking",icon:"🔥",color:"#EF4444"},

  {id:"sports",label:"Αθλητικά",icon:"⚽",color:"#F97316"},
  {id:"world",label:"Κόσμος",icon:"🌍",color:"#06B6D4"},

  {id:"health",label:"Gym & Health",icon:"💪",color:"#4ADE80"},

  sports:`https://news.google.com/rss/search?q=site:sport24.gr+OR+site:gazzetta.gr+OR+site:sdna.gr&hl=el&gl=GR&ceid=GR:el`,
  world:`https://news.google.com/rss/search?q=site:kathimerini.gr+OR+site:tovima.gr+διεθνή&hl=el&gl=GR&ceid=GR:el`,
  nightlife:`https://news.google.com/rss/search?q=site:athensinsider.com+OR+nightlife+Greece&hl=en&gl=GR&ceid=GR:en`,
  tourism:`https://news.google.com/rss/search?q=site:visitgreece.gr+OR+site:greece-is.com+τουρισμός&hl=el&gl=GR&ceid=GR:el`,
  music:`https://news.google.com/rss/search?q=site:rocking.gr+OR+site:avopolis.gr+μουσική&hl=el&gl=GR&ceid=GR:el`,
  health:`https://news.google.com/rss/search?q=site:vita.gr+OR+site:iatronet.gr+υγεία&hl=el&gl=GR&ceid=GR:el`,
  auto:`https://news.google.com/rss/search?q=site:newsauto.gr+OR+site:gocar.gr+OR+site:autotriti.gr&hl=el&gl=GR&ceid=GR:el`,
  beauty:`https://news.google.com/rss/search?q=site:queen.gr+OR+site:vogue.gr+ομορφιά&hl=el&gl=GR&ceid=GR:el`,
};

const PLATFORMS = [
  {id:"instagram",label:"Instagram",icon:"📸",tone:"visual, engaging, με emojis, max 150 λέξεις, τελειώνει με 5 hashtags"},
  {id:"facebook",label:"Facebook",icon:"👥",tone:"πληροφοριακό, φιλικό, max 80 λέξεις, 3 hashtags"},
  {id:"tiktok",label:"TikTok",icon:"🎵",tone:"πολύ σύντομο, viral, hook στην πρώτη γραμμή, max 50 λέξεις"},
  {id:"twitter",label:"X / Twitter",icon:"𝕏",tone:"άμεσο, έντονο, max 280 χαρακτήρες, 2 hashtags"},
  {id:"threads",label:"Threads",icon:"🧵",tone:"conversational, max 100 λέξεις, χωρίς πολλά hashtags"},
];

const BANNERS = [
  {label:"Διαφήμιση",sub:"Your Ad Here",color1:"#2563EB",color2:"#06B6D4",url:"#"},
  {label:"Διαφήμιση",sub:"Your Ad Here",color1:"#7C3AED",color2:"#EC4899",url:"#"},
  {label:"Διαφήμιση",sub:"Your Ad Here",color1:"#10B981",color2:"#84CC16",url:"#"},
];

function getCat(id){return CATEGORIES.find(c=>c.id===id)||CATEGORIES[0];}

function timeAgo(date){
  const d=Math.floor((Date.now()-date)/60000);
  if(d<1)return"Μόλις τώρα";
  if(d<60)return`${d} λεπτά`;
  if(d<1440)return`${Math.floor(d/60)} ώρες`;
  return`${Math.floor(d/1440)} μέρες`;
}

function extractDomain(url){
  try{return new URL(url).hostname.replace("www.","");}catch{return"";}
}

async function fetchRSS(category){
  const feed=RSS_FEEDS[category];
  if(!feed)return[];
  try{
    const url=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=20`;
    const res=await fetch(url);
    const data=await res.json();
    if(!data.items)return[];
    return data.items.map((item,i)=>({
      id:`rss-${category}-${i}-${Date.now()}`,
      title:item.title?.replace(/\s*-\s*[^-]+$/,"")||"",
      summary:item.description?.replace(/<[^>]+>/g,"").slice(0,160)||"",
      time:timeAgo(new Date(item.pubDate)),
      category,
      hot:Math.floor(70+Math.random()*29),
      source:extractDomain(item.link),
      url:item.link||"#",
    }));
  }catch{return[];}
}

async function generateCaption(item,platform){
  const p=PLATFORMS.find(x=>x.id===platform);
  const cat=getCat(item.category);
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",max_tokens:1000,
      messages:[{role:"user",content:`Είσαι social media manager με 3 εκατομμύρια followers στην Ελλάδα.\nΓράψε ένα post για ${p.label}.\nΎφος: ${p.tone}.\nΓράψε ΜΟΝΟ το κείμενο, στα Ελληνικά.\nΚατηγορία: ${cat.icon} ${cat.label}\nΤίτλος: ${item.title}\nΠερίληψη: ${item.summary}`}],
    }),
  });
  const data=await res.json();
  return data.content?.[0]?.text||"Σφάλμα.";
}

function HotMeter({value,color}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <div style={{width:44,height:3,background:"#1C1F2E",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${value}%`,height:"100%",background:color,borderRadius:2,boxShadow:`0 0 6px ${color}`}}/>
      </div>
      <span style={{fontSize:10,fontWeight:700,color,letterSpacing:"0.04em"}}>{value}</span>
    </div>
  );
}

function ShareMenu({item,color,onClose}){
  const txt=encodeURIComponent(`${item.title} — ${item.url}`);
  const links=[
    {label:"Facebook",icon:"👥",url:`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(item.url)}`},
    {label:"X/Twitter",icon:"𝕏",url:`https://twitter.com/intent/tweet?text=${txt}`},
    {label:"WhatsApp",icon:"💬",url:`https://wa.me/?text=${txt}`},
    {label:"Copy link",icon:"🔗",url:null},
  ];
  return(
    <div style={{position:"absolute",right:0,bottom:"110%",background:"#0F1117",border:`1px solid ${color}44`,borderRadius:10,padding:8,zIndex:99,minWidth:150,boxShadow:"0 -8px 32px rgba(0,0,0,0.5)"}}>
      {links.map(l=>(
        <div key={l.label} onClick={()=>{if(l.url)window.open(l.url,"_blank");else navigator.clipboard.writeText(item.url);onClose();}}
          style={{padding:"7px 12px",fontSize:12,fontWeight:600,color:"#F1F5F9",cursor:"pointer",borderRadius:7,display:"flex",alignItems:"center",gap:8}}
          onMouseEnter={e=>e.currentTarget.style.background=color+"22"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          {l.icon} {l.label}
        </div>
      ))}
    </div>
  );
}

function FeaturedCard({item,onConvert}){

    trending:"linear-gradient(135deg,#052e16 0%,#14532d 60%,#08090F 100%)",
    viral:"linear-gradient(135deg,#1c1203 0%,#78350f 60%,#08090F 100%)",
    lifestyle:"linear-gradient(135deg,#2d0a1f 0%,#831843 60%,#08090F 100%)",
    sports:"linear-gradient(135deg,#1a0a00 0%,#7c2d12 60%,#08090F 100%)",
    world:"linear-gradient(135deg,#042f2e 0%,#134e4a 60%,#08090F 100%)",
    nightlife:"linear-gradient(135deg,#1e1040 0%,#3b0764 60%,#08090F 100%)",
    tourism:"linear-gradient(135deg,#042f2e 0%,#065f46 60%,#08090F 100%)",
    music:"linear-gradient(135deg,#2d0a1f 0%,#9d174d 60%,#08090F 100%)",
    health:"linear-gradient(135deg,#052e16 0%,#166534 60%,#08090F 100%)",
    auto:"linear-gradient(135deg,#0a1628 0%,#1e3a5f 60%,#08090F 100%)",
    beauty:"linear-gradient(135deg,#2d0a1f 0%,#9d174d 60%,#08090F 100%)",
  };
  return(
    <div style={{background:gradients[item.category]||gradients.breaking,borderRadius:20,border:`1px solid ${cat.color}33`,padding:"32px 28px",position:"relative",overflow:"hidden",boxShadow:`0 0 80px ${cat.color}15`,marginBottom:14}}>
      <div style={{position:"absolute",top:-80,right:-80,width:280,height:280,borderRadius:"50%",background:cat.color,opacity:0.07,filter:"blur(80px)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",right:16,bottom:-16,fontSize:130,opacity:0.05,pointerEvents:"none",userSelect:"none",lineHeight:1}}>{cat.icon}</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{fontSize:10,fontWeight:900,color:cat.color,border:`1px solid ${cat.color}`,padding:"3px 10px",borderRadius:4,background:`${cat.color}15`,letterSpacing:"0.1em"}}>★ TOP STORY</span>
        <span style={{fontSize:11,fontWeight:700,color:cat.color}}>{cat.icon} {cat.label}</span>
        <HotMeter value={item.hot} color={cat.color}/>
        <span style={{fontSize:11,color:"rgba(241,245,249,0.35)",marginLeft:"auto"}}>{item.source} · {item.time}</span>
      </div>
      <h2 onClick={()=>item.url&&item.url!=="#"&&window.open(item.url,"_blank")} style={{margin:"0 0 12px",fontSize:26,fontWeight:900,color:"#fff",lineHeight:1.25,maxWidth:560,letterSpacing:"-0.02em",cursor:"pointer"}}>{item.title}</h2>
      <p style={{margin:"0 0 22px",fontSize:14,color:"rgba(241,245,249,0.6)",lineHeight:1.65,maxWidth:500}}>{item.summary}</p>
      <div style={{display:"flex",gap:10,alignItems:"center",position:"relative",flexWrap:"wrap"}}>
        <button onClick={()=>onConvert(item)} style={{fontSize:13,fontWeight:800,color:"#fff",background:`linear-gradient(135deg,${cat.color}dd,${cat.color}99)`,border:"none",borderRadius:10,padding:"11px 22px",cursor:"pointer",boxShadow:`0 4px 24px ${cat.color}44`}}>✦ Δημιουργία Social Post</button>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowShare(s=>!s)} style={{fontSize:13,fontWeight:700,color:cat.color,background:`${cat.color}18`,border:`1px solid ${cat.color}44`,borderRadius:10,padding:"11px 16px",cursor:"pointer"}}>↗ Μοιράσου</button>
          {showShare&&<ShareMenu item={item} color={cat.color} onClose={()=>setShowShare(false)}/>}
        </div>
        {item.url&&item.url!=="#"&&<a href={item.url} target="_blank" rel="noreferrer" style={{fontSize:12,color:"rgba(255,255,255,0.4)",textDecoration:"none"}}>Πηγή →</a>}
      </div>
    </div>
  );
}

function NewsCard({item,onConvert}){
  const [hovered,setHovered]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const cat=getCat(item.category);
  return(
    <div onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{background:hovered?C.cardHover:C.card,border:`1px solid ${hovered?cat.color+"44":C.border}`,borderLeft:`3px solid ${item.own?C.amber:cat.color}`,borderRadius:12,padding:"14px 18px",display:"grid",gridTemplateColumns:"1fr auto",gap:"8px 14px",alignItems:"start",transition:"all 0.18s",marginBottom:8}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7,flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:800,color:cat.color,background:`${cat.color}15`,padding:"2px 8px",borderRadius:20}}>{cat.icon} {cat.label}</span>
          {item.own&&<span style={{fontSize:10,fontWeight:700,color:C.amber,border:`1px solid ${C.amber}44`,padding:"2px 7px",borderRadius:20}}>✍ ClikNews</span>}
          <span style={{fontSize:11,color:C.textMuted}}>{item.source} · {item.time}</span>
        </div>
        <h3 onClick={()=>item.url&&item.url!=="#"&&window.open(item.url,"_blank")} style={{margin:"0 0 5px",fontSize:14,fontWeight:800,color:C.textPrimary,lineHeight:1.35,cursor:"pointer"}}>{item.title}</h3>
        <p style={{margin:0,fontSize:12,color:C.textSecondary,lineHeight:1.55}}>{item.summary}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,paddingTop:2}}>
        <HotMeter value={item.hot} color={cat.color}/>
        <button onClick={()=>onConvert(item)} style={{fontSize:11,fontWeight:800,whiteSpace:"nowrap",color:hovered?"#fff":cat.color,background:hovered?cat.color:`${cat.color}15`,border:`1px solid ${cat.color}44`,borderRadius:7,padding:"5px 10px",cursor:"pointer",transition:"all 0.15s"}}>✦ Post</button>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowShare(s=>!s)} style={{fontSize:11,fontWeight:700,color:C.textMuted,background:"none",border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 10px",cursor:"pointer"}}>↗</button>
          {showShare&&<ShareMenu item={item} color={cat.color} onClose={()=>setShowShare(false)}/>}
        </div>
      </div>
    </div>
  );
}

function PostModal({item,onClose,onPosted}){
  const cat=getCat(item.category);
  const [platform,setPlatform]=useState("instagram");
  const [caption,setCaption]=useState(`${cat.icon} ${item.title}\n\n${item.summary}`);
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(false);
  const generate=async()=>{
    setLoading(true);
    try{setCaption(await generateCaption(item,platform));onPosted();}
    catch{setCaption("Σφάλμα. Δοκίμασε ξανά.");}
    setLoading(false);
  };
  const copy=()=>{navigator.clipboard.writeText(caption);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}} onClick={onClose}>
      <div style={{background:"#0F1117",border:`1px solid ${cat.color}44`,borderRadius:20,padding:26,maxWidth:540,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <span style={{fontSize:12,fontWeight:800,color:cat.color}}>{cat.icon} {cat.label}</span>
        <h3 style={{margin:"6px 0 18px",fontSize:15,fontWeight:800,color:C.textPrimary,lineHeight:1.3}}>{item.title}</h3>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {PLATFORMS.map(p=><button key={p.id} onClick={()=>setPlatform(p.id)} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:platform===p.id?cat.color:"#ffffff08",color:platform===p.id?"#fff":C.textSecondary,border:`1px solid ${platform===p.id?cat.color:C.border}`}}>{p.icon} {p.label}</button>)}
        </div>
        <button onClick={generate} disabled={loading} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:loading?C.border:`linear-gradient(135deg,${cat.color},#7C3AED)`,color:"#fff",fontSize:14,fontWeight:800,cursor:loading?"default":"pointer",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading?<><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Δημιουργία…</>:"✦ Δημιουργία με AI"}
        </button>
        <textarea value={caption} onChange={e=>setCaption(e.target.value)} rows={7} style={{width:"100%",boxSizing:"border-box",background:"#08090F",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",fontSize:13,lineHeight:1.6,fontFamily:"inherit",resize:"vertical",color:C.textPrimary}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
          <button onClick={onClose} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"none",cursor:"pointer",fontSize:13,color:C.textMuted}}>Κλείσιμο</button>
          <button onClick={copy} style={{padding:"9px 22px",borderRadius:8,border:"none",background:copied?C.green:cat.color,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800}}>{copied?"✓ Αντιγράφηκε!":"Αντιγραφή"}</button>
        </div>
      </div>
    </div>
  );
}

function AdminModal({onSave,onClose}){
  const [pass,setPass]=useState("");const [auth,setAuth]=useState(false);
  const [title,setTitle]=useState("");const [summary,setSummary]=useState("");
  const [category,setCategory]=useState("music");const [url,setUrl]=useState("");
  const [scheduleDate,setScheduleDate]=useState("");const [error,setError]=useState("");
  const login=()=>{if(pass===ADMIN_PASSWORD)setAuth(true);else setError("Λάθος κωδικός!");};
  const save=()=>{if(!title.trim())return;onSave({title,summary,category,url:url||"#",scheduleDate});};
  const inp={width:"100%",boxSizing:"border-box",background:"#08090F",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 13px",fontSize:13,color:C.textPrimary,fontFamily:"inherit",outline:"none",marginBottom:10};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}} onClick={onClose}>
      <div style={{background:"#0F1117",border:`1px solid ${C.amber}33`,borderRadius:20,padding:26,maxWidth:500,width:"100%"}} onClick={e=>e.stopPropagation()}>
        {!auth?(
          <>
            <h3 style={{margin:"0 0 16px",fontSize:17,fontWeight:900,color:C.textPrimary}}>🔐 Admin</h3>
            <input type="password" placeholder="Κωδικός…" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} style={inp}/>
            {error&&<p style={{margin:"0 0 10px",fontSize:12,color:C.breaking}}>{error}</p>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"none",cursor:"pointer",fontSize:13,color:C.textMuted}}>Ακύρωση</button>
              <button onClick={login} style={{padding:"9px 20px",borderRadius:8,border:"none",background:C.amber,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800}}>Είσοδος</button>
            </div>
          </>
        ):(
          <>
            <h3 style={{margin:"0 0 18px",fontSize:17,fontWeight:900,color:C.textPrimary}}>✍️ Νέο Άρθρο</h3>
            <input placeholder="Τίτλος…" value={title} onChange={e=>setTitle(e.target.value)} style={inp}/>
            <textarea placeholder="Περίληψη…" value={summary} onChange={e=>setSummary(e.target.value)} rows={3} style={{...inp,resize:"vertical"}}/>
            <input placeholder="URL…" value={url} onChange={e=>setUrl(e.target.value)} style={inp}/>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{...inp,appearance:"none"}}>
              {CATEGORIES.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
            <input type="datetime-local" value={scheduleDate} onChange={e=>setScheduleDate(e.target.value)} style={inp}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"none",cursor:"pointer",fontSize:13,color:C.textMuted}}>Ακύρωση</button>
              <button onClick={save} style={{padding:"9px 20px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.amber},#D97706)`,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800}}>{scheduleDate?"⏰ Προγραμματισμός":"Δημοσίευση"}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

  return(
    <div>
      {[1,2,3,4,5].map(i=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 18px",marginBottom:8,opacity:0.6}}>
          <div style={{width:"30%",height:12,background:C.border,borderRadius:6,marginBottom:10,animation:"pulse 1.5s infinite"}}/>
          <div style={{width:"85%",height:16,background:C.border,borderRadius:6,marginBottom:8,animation:"pulse 1.5s infinite"}}/>
          <div style={{width:"60%",height:12,background:C.border,borderRadius:6,animation:"pulse 1.5s infinite"}}/>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [activeCat,setActiveCat]=useState("all");
  const [search,setSearch]=useState("");
  const [convertItem,setConvertItem]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [ownArticles,setOwnArticles]=useState([]);
  const [rssArticles,setRssArticles]=useState([]);
  const [loading,setLoading]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(new Date());
  const [refreshing,setRefreshing]=useState(false);
  const [postCount,setPostCount]=useState(0);
  const [konami,setKonami]=useState([]);

  const loadNews=useCallback(async(cat)=>{
    setLoading(true);
    try{
      let items=[];
      if(cat==="all"){
        const cats=Object.keys(RSS_FEEDS);
        const results=await Promise.all(cats.slice(0,6).map(c=>fetchRSS(c)));
        items=results.flat().sort(()=>Math.random()-0.5).slice(0,30);
      }else{
        items=await fetchRSS(cat);
      }
      setRssArticles(items);
    }catch{setRssArticles([]);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadNews(activeCat);},[activeCat]);

  // Αυτόματη ανανέωση κάθε 15 λεπτά
  useEffect(()=>{
    const t=setInterval(()=>{loadNews(activeCat);setLastRefresh(new Date());},15*60*1000);
    return()=>clearInterval(t);
  },[activeCat]);

  const handleRefresh=()=>{
    setRefreshing(true);
    loadNews(activeCat).then(()=>{setLastRefresh(new Date());setRefreshing(false);});
  };

  const handleLogoClick=()=>{
    const now=Date.now();
    setKonami(prev=>{const next=[...prev.filter(t=>now-t<1500),now];if(next.length>=3){setShowAdmin(true);return[];}return next;});
  };

  const allItems=[...ownArticles.map(a=>({...a,own:true})),...rssArticles];
  const filtered=allItems.filter(item=>{
    const matchCat=activeCat==="all"||item.category===activeCat;
    const matchSearch=!search||item.title.toLowerCase().includes(search.toLowerCase());
    return matchCat&&matchSearch;
  }).sort((a,b)=>(b.hot||0)-(a.hot||0));

  const featuredItem=filtered[0];
  const restItems=filtered.slice(1);
  const breakingCount=filtered.filter(i=>i.category==="breaking").length;

  const addArticle=({title,summary,category,url,scheduleDate})=>{
    setOwnArticles(prev=>[{id:Date.now(),title,summary,category,url:url||"#",time:scheduleDate?`Προγρ. ${new Date(scheduleDate).toLocaleString("el-GR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`:"Μόλις τώρα",own:true,hot:75,source:"ClikNews"},...prev]);
    setShowAdmin(false);
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <header style={{background:"linear-gradient(180deg,#0C0E1A 0%,#08090F 100%)",borderBottom:`1px solid ${C.border}`,padding:"0 24px",height:62,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",flexDirection:"column",gap:2,cursor:"pointer"}} onClick={handleLogoClick}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${C.cobalt},${C.neonCyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>📡</div>
            <span style={{fontSize:22,fontWeight:900,letterSpacing:"-0.04em",background:"linear-gradient(135deg,#fff 20%,#3B82F6 80%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ClikNews.gr</span>
            {breakingCount>0&&<span onClick={()=>setActiveCat("breaking")} style={{fontSize:10,fontWeight:900,color:C.breaking,border:`1px solid ${C.breaking}44`,padding:"2px 8px",borderRadius:4,background:`${C.breaking}10`,animation:"blink 1.5s infinite",cursor:"pointer"}}>🔥 {breakingCount} BREAKING</span>}
          </div>
          <span style={{fontSize:10,color:C.textMuted,letterSpacing:"0.03em",paddingLeft:40}}>Όλες οι σημαντικές Ειδήσεις σε Ελλάδα και Κόσμο</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {postCount>0&&<span style={{fontSize:11,fontWeight:700,color:C.green,background:`${C.green}15`,border:`1px solid ${C.green}33`,borderRadius:20,padding:"3px 10px"}}>✦ {postCount} posts</span>}
          <input placeholder="🔍 Αναζήτηση…" value={search} onChange={e=>setSearch(e.target.value)} style={{background:"#ffffff07",border:`1px solid ${C.border}`,borderRadius:10,padding:"7px 13px",fontSize:13,color:C.textPrimary,width:160,outline:"none"}}/>
          <button onClick={handleRefresh} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:14,color:C.textMuted,display:"inline-block",transition:"transform 0.6s",transform:refreshing?"rotate(360deg)":"none"}}>↻</button>
          <span style={{fontSize:10,color:C.textMuted}}>{lastRefresh.toLocaleTimeString("el-GR",{hour:"2-digit",minute:"2-digit"})}</span>
        </div>
      </header>

      {/* Category + Banners */}
      <div style={{background:"#0B0C14",borderBottom:`1px solid ${C.border}`,padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{position:"relative",width:200,flexShrink:0}}>
          <select value={activeCat} onChange={e=>setActiveCat(e.target.value)} style={{width:"100%",background:"#08090F",border:`1px solid ${getCat(activeCat).color}55`,borderRadius:10,padding:"8px 36px 8px 14px",fontSize:13,fontWeight:700,color:getCat(activeCat).color,cursor:"pointer",outline:"none",appearance:"none",WebkitAppearance:"none"}}>
            {CATEGORIES.map(cat=><option key={cat.id} value={cat.id} style={{color:cat.color,background:"#08090F"}}>{cat.icon} {cat.label}</option>)}
          </select>
          <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:12,color:getCat(activeCat).color}}>▼</span>
        </div>
        {BANNERS.map((b,i)=>(
          <a key={i} href={b.url} target="_blank" rel="noreferrer" style={{flex:1,minWidth:90,height:38,borderRadius:10,position:"relative",overflow:"hidden",cursor:"pointer",border:"1px solid rgba(255,255,255,0.1)",textDecoration:"none"}}>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,${b.color1}cc,${b.color2}cc)`}}/>
            <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.07)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)"}}/>
            <div style={{position:"absolute",top:0,left:0,right:0,height:"45%",background:"linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 100%)",borderRadius:"10px 10px 0 0"}}/>
            <div style={{position:"relative",zIndex:1,height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
              <span style={{fontSize:11,fontWeight:900,color:"#fff",letterSpacing:"0.06em",textShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>{b.label}</span>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.65)"}}>{b.sub}</span>
            </div>
          </a>
        ))}
      </div>

      {/* Content */}
      <main style={{padding:"18px 20px",maxWidth:860,margin:"0 auto"}}>
        {loading?<LoadingSkeleton/>:filtered.length===0
          ?<div style={{textAlign:"center",color:C.textMuted,padding:"80px 0",fontSize:14}}>Δεν βρέθηκαν ειδήσεις.</div>
          :<>
            {featuredItem&&<FeaturedCard item={featuredItem} onConvert={setConvertItem}/>}
            {restItems.map(item=><NewsCard key={item.id} item={item} onConvert={setConvertItem}/>)}
          </>
        }
      </main>

      <footer style={{borderTop:`1px solid ${C.border}`,padding:"16px 24px",textAlign:"center"}}>
        <span style={{fontSize:11,color:C.textMuted}}>© 2026 ClikNews.gr · Όλες οι σημαντικές Ειδήσεις σε Ελλάδα και Κόσμο</span>
      </footer>

      {convertItem&&<PostModal item={convertItem} onClose={()=>setConvertItem(null)} onPosted={()=>setPostCount(n=>n+1)}/>}
      {showAdmin&&<AdminModal onSave={addArticle} onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
